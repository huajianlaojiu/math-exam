<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>小学数学出卷系统 · 1-6年级人教版</title>
<style>
:root{--bg:#f5f2eb;--paper:#fff;--border:#d9d4c8;--text:#2c2416;--text-light:#6b5e4a;--accent:#b5392e;--correct:#2d7d46;--wrong:#c0392b;--warn:#e67e22;--btn-bg:#2c2416;--btn-hover:#4a3f2e;--surface:#faf8f3}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"PingFang SC","Noto Sans SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.7;-webkit-font-smoothing:antialiased;min-height:100vh}
.hidden{display:none!important}
#screen-home{max-width:720px;margin:40px auto;padding:0 16px}
.hero{text-align:center;padding:48px 20px 32px}
.hero h1{font-size:28px;font-weight:800;letter-spacing:1px;margin-bottom:6px}
.hero .sub{font-size:14px;color:var(--text-light)}
.selector{background:var(--paper);border-radius:6px;padding:28px 24px;box-shadow:0 1px 4px rgba(0,0,0,0.04),0 4px 16px rgba(0,0,0,0.03)}
.selector .label{font-size:13px;font-weight:700;color:var(--text-light);margin-bottom:8px;display:block}
.grade-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:24px}
.grade-btn{padding:14px 8px;font-size:14px;font-weight:600;border:2px solid var(--border);border-radius:6px;background:var(--paper);cursor:pointer;text-align:center;transition:all .15s}
.grade-btn:hover{border-color:var(--accent);background:#fef9f5}
.grade-btn.active{border-color:var(--accent);background:#fef5f0;color:var(--accent)}
.unit-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px;max-height:240px;overflow-y:auto}
.unit-btn{padding:10px 12px;font-size:13px;border:1.5px solid var(--border);border-radius:4px;background:var(--surface);cursor:pointer;text-align:left;transition:all .15s}
.unit-btn:hover{border-color:var(--accent);background:#fef9f5}
.unit-btn.active{border-color:var(--accent);background:#fef5f0;color:var(--accent);font-weight:600}
.type-row{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
.type-row .label{font-size:13px;font-weight:700;color:var(--text-light);margin-bottom:0}
.type-row select{padding:8px 12px;border:1.5px solid var(--border);border-radius:4px;font-size:14px;background:var(--surface);cursor:pointer}
.count-row{display:flex;gap:12px;align-items:center;margin-bottom:20px}
.count-row input{width:70px;padding:8px 10px;border:1.5px solid var(--border);border-radius:4px;font-size:14px;text-align:center;background:var(--surface)}
.start-btn{width:100%;padding:14px;font-size:16px;font-weight:700;background:var(--btn-bg);color:#fff;border:none;border-radius:6px;cursor:pointer;letter-spacing:1px;transition:all .15s}
.start-btn:hover{background:var(--btn-hover)}
.start-btn:disabled{opacity:.35;cursor:not-allowed}
.err-msg{color:var(--wrong);font-size:13px;text-align:center;margin-top:8px;display:none}
#screen-exam{max-width:860px;margin:40px auto 60px;padding:0 16px}
.exam-paper{background:var(--paper);padding:48px 56px 40px;box-shadow:0 1px 4px rgba(0,0,0,0.08),0 8px 32px rgba(0,0,0,0.06);border-radius:4px}
.exam-header{text-align:center;border-bottom:2px solid var(--border);padding-bottom:20px;margin-bottom:4px}
.exam-header h1{font-size:24px;font-weight:700;letter-spacing:1px;margin-bottom:2px}
.exam-header .sub{font-size:13px;color:var(--text-light)}
.exam-info{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px dotted var(--border);margin-bottom:14px;font-size:13px;color:var(--text-light);flex-wrap:wrap;gap:8px}
.exam-info .score-badge{background:var(--accent);color:#fff;padding:3px 12px;border-radius:3px;font-weight:600;font-size:12px}
.timer{font-variant-numeric:tabular-nums;font-weight:600;color:var(--text)}
.sec-title{font-size:17px;font-weight:700;margin:24px 0 12px;padding-bottom:5px;border-bottom:2px solid var(--accent);display:flex;align-items:baseline;gap:10px}
.sec-title .badge{font-size:12px;font-weight:500;color:var(--text-light);background:#f5f2eb;padding:1px 8px;border-radius:2px}
.q{padding:10px 0;border-bottom:1px dashed #f0ede5}
.q:last-child{border-bottom:none}
.q .q-num{font-weight:700;color:var(--accent);margin-right:6px}
.q .q-text{display:inline}
.q .q-score{color:var(--text-light);font-size:11px;margin-left:4px}
.opts{margin-top:6px;display:flex;flex-wrap:wrap;gap:10px 16px}
.opts label{cursor:pointer;padding:3px 10px;border:1.5px solid var(--border);border-radius:3px;font-size:13px;transition:all .15s;user-select:none;display:flex;align-items:center;gap:4px}
.opts label:hover{border-color:#bbb;background:#fdfcf9}
.opts input{display:none}
.opts input:checked+span{font-weight:600;color:var(--accent)}
.opts label:has(input:checked){border-color:var(--accent);background:#fef9f5}
.tf-opts{margin-top:6px;display:flex;gap:16px}
.tf-opts label{cursor:pointer;padding:3px 14px;border:1.5px solid var(--border);border-radius:3px;font-size:13px;transition:all .15s;user-select:none}
.tf-opts label:hover{border-color:#bbb;background:#fdfcf9}
.tf-opts input{display:none}
.tf-opts input:checked+span{font-weight:600;color:var(--accent)}
.tf-opts label:has(input:checked){border-color:var(--accent);background:#fef9f5}
.fill-input{margin-top:6px;display:flex;gap:8px;align-items:center}
.fill-input input{padding:5px 10px;border:1.5px solid var(--border);border-radius:3px;font-size:14px;width:160px;background:var(--surface)}
.correct-show label.correct-opt{border-color:var(--correct)!important;background:#eef7f0!important}
.correct-show label.wrong-opt{border-color:var(--wrong)!important;background:#fdefef!important}
.fill-correct{border-color:var(--correct)!important;background:#eef7f0!important}
.fill-wrong{border-color:var(--wrong)!important;background:#fdefef!important}
.explain{font-size:12px;color:var(--correct);margin-top:3px;display:none;line-height:1.6}
.q.show-explain .explain{display:block}
.q.unanswered{background:#fffdf7}
.q .hint{font-size:11px;color:var(--warn);display:none;margin-top:3px}
.q.unanswered .hint{display:block}
.actions{text-align:center;margin-top:32px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn{padding:9px 24px;font-size:14px;font-weight:600;border:none;border-radius:4px;cursor:pointer;transition:all .15s;letter-spacing:1px}
.btn-primary{background:var(--btn-bg);color:#fff}
.btn-primary:hover{background:var(--btn-hover)}
.btn-secondary{background:#f5f2eb;color:var(--text);border:1.5px solid var(--border)}
.btn-secondary:hover{background:#ebe6da}
.btn:disabled{opacity:.4;cursor:not-allowed}
.result{text-align:center;margin-top:24px;padding:20px;background:#fdfcf9;border:2px solid var(--border);border-radius:4px;display:none}
.result .total{font-size:44px;font-weight:800;color:var(--accent)}
.result .out-of{color:var(--text-light);margin-left:4px}
.result .detail{margin-top:6px;font-size:13px;color:var(--text-light)}
.footer{text-align:center;padding:20px;font-size:12px;color:var(--text-light);opacity:.7}
@media(max-width:600px){.exam-paper{padding:24px 16px 20px}.grade-grid{grid-template-columns:repeat(2,1fr)}.unit-grid{grid-template-columns:1fr}#screen-home{margin:16px auto}}
</style>
</head>

<div id="screen-home">
<div class="hero">
<h1>📐 小学数学出卷系统</h1>
<div class="sub">人教版 · 1-6 年级 · 随机出卷 · 自动批改+解析</div>
</div>
<div class="selector">
<span class="label">选择年级</span>
<div class="grade-grid" id="gradeGrid"></div>
<span class="label">选择单元</span>
<div class="unit-grid" id="unitGrid"></div>
<div class="type-row">
<span class="label">题型组合</span>
<select id="qtypeSelect">
<option value="all">全部题型</option>
<option value="c">仅选择题</option>
<option value="tf">仅判断题</option>
<option value="f">仅填空题</option>
<option value="c+tf">选择题+判断题</option>
<option value="c+tf+f">选择题+判断题+填空题</option>
</select>
</div>
<div class="count-row" style="opacity:0.7;pointer-events:none;">
<span class="label">题目数量</span>
<input type="number" id="qcount" value="35" min="5" max="100" step="5" readonly style="background:#eee;"> <span style="font-size:12px;color:var(--text-light)">（单元20题 / 综合35题）</span>
</div>
<button class="start-btn" id="btnStart">开始出卷</button>
<div class="err-msg" id="errMsg"></div>
</div>
</div>

<div id="screen-exam" class="hidden">
<div class="exam-paper">
<div class="exam-header">
<h1 id="examTitle">小学数学模拟试卷</h1>
<div class="sub" id="examSub"></div>
</div>
<div class="exam-info">
<span class="timer" id="timer">00:00</span>
<span class="score-badge" id="liveScore">得分：0</span>
</div>
<div id="examBody"></div>
<div class="actions">
<button class="btn btn-primary" id="btnSubmit">提交试卷</button>
<button class="btn btn-secondary" id="btnReset">重新作答</button>
<button class="btn btn-secondary" id="btnBack">返回选题</button>
</div>
<div class="result" id="resultPanel">
<div class="total" id="totalScore">0</div>
<div class="out-of" id="totalOutOf">/ 100 分</div>
<div class="detail" id="resultMsg"></div>
</div>
</div>
<div class="footer">小学数学出卷系统 · 人教版1-6年级 · 2280道题库</div>
</div>
<script>
let seconds=0,timerInterval=null;
function pad(n){return n.toString().padStart(2,'0');}
function startTimer(){if(timerInterval)return;timerInterval=setInterval(()=>{seconds++;document.getElementById('timer').textContent=pad(Math.floor(seconds/60))+':'+pad(seconds%60);},1000);}
function stopTimer(){clearInterval(timerInterval);timerInterval=null;}
function updateLiveScore(){let total=0;document.querySelectorAll('.q').forEach(q=>{const pts=parseInt(q.dataset.points),ans=q.dataset.answer;if(ans){const checked=q.querySelector('input[type="radio"]:checked');if(checked&&checked.value===ans)total+=pts;}});document.getElementById('liveScore').textContent='得分：'+total;}
document.addEventListener('change',e=>{if(e.target.type==='radio'){e.target.closest('.q').classList.remove('unanswered');updateLiveScore();startTimer();}});
document.addEventListener('input',e=>{if(e.target.tagName==='INPUT'&&e.target.closest('.fill-input')){if(e.target.value.trim())e.target.closest('.q').classList.remove('unanswered');startTimer();}});

function submitExam(){stopTimer();let total=0,un=0;document.querySelectorAll('.q').forEach(q=>{const type=q.dataset.type,pts=parseInt(q.dataset.points),ans=q.dataset.answer;if(!ans)return;const checked=q.querySelector('input[type="radio"]:checked');if(type==='c'||type==='tf'){const opts=q.querySelector('.opts')||q.querySelector('.tf-opts');if(!checked){q.classList.add('unanswered');un++;return;}opts.classList.add('correct-show');opts.querySelectorAll('label').forEach(l=>{const inp=l.querySelector('input');if(inp.value===ans)l.classList.add('correct-opt');if(inp===checked&&inp.value!==ans)l.classList.add('wrong-opt');});q.classList.add('show-explain');if(checked.value===ans)total+=pts;}if(type==='f'||type==='calc'||type==='app'){const inp=q.querySelector('.fill-input input');if(!inp||!inp.value.trim()){q.classList.add('unanswered');un++;return;}q.classList.add('show-explain');const userAns=inp.value.trim().replace(/\s+/g,'');const correctAns=ans.replace(/\s+/g,'');if(userAns===correctAns){total+=pts;inp.classList.add('fill-correct');}else{inp.classList.add('fill-wrong');}}});document.getElementById('totalScore').textContent=total;document.getElementById('totalOutOf').textContent='/ '+document.getElementById('totalOutOf').dataset.max+' 分';document.getElementById('resultPanel').style.display='block';document.getElementById('btnSubmit').disabled=true;let msg='';if(total>=document.getElementById('totalOutOf').dataset.max*0.9)msg='🏆 太棒了！掌握得非常扎实！';else if(total>=document.getElementById('totalOutOf').dataset.max*0.75)msg='👍 很不错！继续加油！';else if(total>=document.getElementById('totalOutOf').dataset.max*0.6)msg='📖 基本达标，有些知识点还需复习。';else msg='💪 别灰心！建议复习课本重点章节。';if(un>0)msg+=' 还有'+un+'道题未作答。';document.getElementById('resultMsg').textContent=msg;document.getElementById('resultPanel').scrollIntoView({behavior:'smooth'});}

function resetExam(){stopTimer();seconds=0;document.getElementById('timer').textContent='00:00';document.getElementById('liveScore').textContent='得分：0';document.querySelectorAll('input[type="radio"]').forEach(r=>r.checked=false);document.querySelectorAll('.fill-input input').forEach(inp=>inp.value='');document.querySelectorAll('.q').forEach(q=>{q.classList.remove('unanswered','show-explain');});document.querySelectorAll('.opts,.tf-opts').forEach(o=>o.classList.remove('correct-show'));document.querySelectorAll('.correct-opt,.wrong-opt,.fill-correct,.fill-wrong').forEach(el=>el.classList.remove('correct-opt','wrong-opt','fill-correct','fill-wrong'));document.getElementById('resultPanel').style.display='none';document.getElementById('btnSubmit').disabled=false;window.scrollTo({top:0,behavior:'smooth'});}

function goBack(){stopTimer();document.getElementById('screen-exam').classList.add('hidden');document.getElementById('screen-home').classList.remove('hidden');window.scrollTo({top:0,behavior:'smooth'});}

// Home screen logic
let selectedGrade=null,selectedUnit=null;
function renderHome(){let gg=document.getElementById('gradeGrid'),ug=document.getElementById('unitGrid');gg.innerHTML='';ug.innerHTML='';let grades=Object.keys(BANK);grades.forEach(g=>{let btn=document.createElement('button');btn.className='grade-btn';btn.textContent=g.replace('上册','上').replace('下册','下');if(selectedGrade===g)btn.classList.add('active');btn.onclick=()=>{selectedGrade=g;selectedUnit=null;renderHome();};gg.appendChild(btn);});if(selectedGrade){let sem=BANK[selectedGrade];let units=Object.keys(sem.u);units.forEach(u=>{let btn=document.createElement('button');btn.className='unit-btn';btn.textContent=u;if(selectedUnit===u)btn.classList.add('active');btn.onclick=()=>{selectedUnit=u;renderHome();};ug.appendChild(btn);});}document.getElementById('btnStart').disabled=!selectedGrade||!selectedUnit;document.getElementById('errMsg').style.display='none';}
function startExam(){if(!selectedGrade||!selectedUnit){document.getElementById('errMsg').textContent='请先选择年级和单元';document.getElementById('errMsg').style.display='block';return;}let questions=BANK[selectedGrade].u[selectedUnit]||[];if(questions.length===0){document.getElementById('errMsg').textContent='该单元题库为空';document.getElementById('errMsg').style.display='block';return;}let qtype=document.getElementById('qtypeSelect').value;let filtered=questions;if(qtype!=='all'){let types=qtype.split('+');filtered=questions.filter(q=>types.includes(q[0]));}if(filtered.length===0){document.getElementById('errMsg').textContent='该题型组合无可用题目';document.getElementById('errMsg').style.display='block';return;}let count=selectedUnit==='期末综合'||selectedUnit==='整理和复习'?35:20;if(count>filtered.length)count=filtered.length;if(count<1)count=1;let selected=shuffle(filtered).slice(0,count);renderExam(selected);document.getElementById('screen-home').classList.add('hidden');document.getElementById('screen-exam').classList.remove('hidden');window.scrollTo({top:0,behavior:'smooth'});resetExam();}
function shuffle(arr){let a=[...arr];for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;return a;}
function renderExam(questions){let totalPoints=0;let body=document.getElementById('examBody');let html='';let groups={c:[],tf:[],f:[],calc:[],app:[]};questions.forEach(q=>{if(q[0]==='c')groups.c.push(q);else if(q[0]==='tf')groups.tf.push(q);else if(q[0]==='calc')groups.calc.push(q);else if(q[0]==='app')groups.app.push(q);else groups.f.push(q);});let qnum=1;['c','tf','f','calc','app'].forEach(type=>{if(groups[type].length===0)return;let titles={c:'一、选择题',tf:'二、判断题',f:'三、填空题',calc:'四、计算题',app:'五、应用题'};let labels={c:'选择题',tf:'判断题',f:'填空题',calc:'计算题',app:'应用题'};html+='<div class="sec-title">'+titles[type]+' <span class="badge">'+labels[type]+'</span></div>';groups[type].forEach(q=>{let points=q[4]||1;totalPoints+=points;html+='<div class="q" data-type="'+q[0]+'" data-points="'+points+'" data-answer="'+q[3].replace(/"/g,'&quot;')+'">';html+='<span class="q-num">'+qnum+'.</span> ';html+='<span class="q-text">'+q[1].replace(/\(  \)/g,'(　)')+'</span>';html+='<span class="q-score">['+points+'分]</span>';if(q[0]==='c'){html+='<div class="opts">';let opts=q[2].split('|');opts.forEach((o,i)=>{let val=o.trim().charAt(0);let label=o.trim();html+='<label><input type="radio" name="q'+qnum+'" value="'+val+'"><span>'+label+'</span></label>';});html+='</div>';}else if(q[0]==='tf'){html+='<div class="tf-opts">';html+='<label><input type="radio" name="q'+qnum+'" value="true"><span>✓ 正确</span></label>';html+='<label><input type="radio" name="q'+qnum+'" value="false"><span>✗ 错误</span></label>';html+='</div>';}else if(q[0]==='f'){html+='<div class="fill-input"><input type="text" placeholder="请输入答案"></div>';}
else if(q[0]==='calc'){html+='<div class="fill-input"><input type="text" placeholder="请写出计算过程和答案"></div>';}
else if(q[0]==='app'){html+='<div class="fill-input"><input type="text" placeholder="请写出解题步骤和答案"></div>';}if(q[5])html+='<div class="explain">💡 '+q[5]+'</div>';html+='<div class="hint">⚠ 此题未作答</div>';html+='</div>';qnum++;});});body.innerHTML=html;document.getElementById('examTitle').textContent='小学数学模拟试卷';document.getElementById('examSub').textContent=selectedGrade+' · '+selectedUnit+' · 共'+questions.length+'题 · 满分'+totalPoints+'分';document.getElementById('totalOutOf').dataset.max=totalPoints;document.getElementById('totalOutOf').textContent='/ '+totalPoints+' 分';document.getElementById('liveScore').textContent='得分：0';seconds=0;document.getElementById('timer').textContent='00:00';stopTimer();document.getElementById('btnSubmit').disabled=false;document.getElementById('resultPanel').style.display='none';}

document.getElementById('btnStart').onclick=startExam;
document.getElementById('btnSubmit').onclick=submitExam;
document.getElementById('btnReset').onclick=resetExam;
document.getElementById('btnBack').onclick=goBack;
renderHome();
</script>
</body>
</html>
